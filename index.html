<!DOCTYPE html>
<html>

<head>
  <title>Login</title>
  <link rel="stylesheet" href="CSS/styles.css">
</head>

<body>

<div class="container">

  <div class="card">

    <h2>Log In</h2>

    <label for="demoSelect" class="field-label">Demo accounts</label>
    <select id="demoSelect" class="field-select">
      <option value="">Choose a demo account</option>
      <option value="student">Student Demo</option>
    </select>
    <div id="statusMsg" class="status-message" aria-live="polite"></div>

    <input id="email" class="field-input" name="email" type="email" placeholder="Email Address" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
    <input id="password" class="field-input" type="password" placeholder="Password">
    <input type="hidden" id="role" value="">
    <button id="loginBtn" type="button">Login</button>

    

  </div>

</div>

<script src="JS/script.js"></script>

</body>
</html>
